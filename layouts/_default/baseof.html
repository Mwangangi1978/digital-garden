<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ block "stylesheets" . }}{{ end }}
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
  {{ block "main" . }}{{ end }}

  <footer class="site-footer-minimal" aria-label="Footer">
    <div class="site-footer-minimal__inner">
      <span class="site-footer-minimal__copy">© 2026 Denis Mwangangi</span>
      <a href="/contact" class="site-footer-minimal__contact">Contact me</a>
      <a href="#" class="site-footer-minimal__top" aria-label="Back to top">↑</a>
    </div>
  </footer>
  
  <script src="{{ "js/header.js" | relURL }}" defer></script>
  <script src="{{ "js/theme.js" | relURL }}" defer></script>
  <script>
    (function () {
      var term = new URLSearchParams(window.location.search).get('highlight');
      if (!term) return;
      history.replaceState(null, '', window.location.pathname);
      var re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      var skip = /^(script|style|noscript|textarea|select|svg|head|mark)$/i;
      var first = null;
      function walk(node) {
        if (node.nodeType === 3) {
          var t = node.textContent;
          if (!re.test(t)) return; re.lastIndex = 0;
          var f = document.createDocumentFragment(), last = 0, m;
          while ((m = re.exec(t)) !== null) {
            f.appendChild(document.createTextNode(t.slice(last, m.index)));
            var mk = document.createElement('mark');
            mk.className = 'search-highlight'; mk.textContent = m[0];
            if (!first) first = mk;
            f.appendChild(mk); last = m.index + m[0].length;
          }
          f.appendChild(document.createTextNode(t.slice(last)));
          node.parentNode.replaceChild(f, node);
          return;
        }
        if (node.nodeType === 1 && !skip.test(node.tagName))
          Array.from(node.childNodes).forEach(walk);
      }
      document.addEventListener('DOMContentLoaded', function () {
        walk(document.querySelector('main') || document.body);
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    })();
  </script>
</body>
</html>
