{{ define "stylesheets" }}
  <link rel="stylesheet" href="{{ "css/contact.css" | relURL }}">
{{ end }}

{{ define "main" }}
<div class="page-container" id="top">
  <main class="contact-main">
    <section class="contact-hero" aria-label="Contact hero">
      <div class="contact-hero__panel">
        <div class="contact-hero__bg" style="background-image: url('{{ .Params.hero_image | default "https://res.cloudinary.com/dxboziyz7/image/upload/q_auto/f_auto/v1778513993/DSC00361_nsxuwv.jpg" }}')"></div>
        <div class="contact-hero__navy" aria-hidden="true"></div>
        <div class="contact-hero__card">
          <div class="contact-hero__inner">
            <p class="contact-hero__eyebrow">KEEP IN TOUCH</p>
            <h1 class="contact-hero__title">Contact me</h1>
            <p class="contact-hero__lede">Please use the email form below if you have a collaboration idea or if you think something would be of interest.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="contact-form-section" aria-label="Contact form">
      <div class="contact-form-wrap">
        <form class="contact-form" action="mailto:dennomwangs1978@gmail.com" method="post" enctype="text/plain">
          <label for="contact-name">Name</label>
          <input id="contact-name" name="name" type="text" required>

          <label for="contact-email">Email</label>
          <input id="contact-email" name="email" type="email" required>

          <label for="contact-subject">Subject</label>
          <input id="contact-subject" name="subject" type="text">

          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="6" required></textarea>

          <button type="submit">Send message</button>
        </form>
      </div>
    </section>
  </main>
</div>
{{ end }}
