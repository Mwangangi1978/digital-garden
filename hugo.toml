baseURL = "https://denismwangangi.com/"
languageCode = "en"
title = "Denis Mwangangi | Digital Garden"

[params]
  description = "Denis Mwangangi's digital garden — essays, moments, watercolors, and projects from Nairobi."
  author      = "Denis Mwangangi"
  twitterHandle = "@byDenisM"
  defaultImage = "https://res.cloudinary.com/dxboziyz7/image/upload/q_auto,f_auto,w_1200,h_630,c_fill/v1778532521/DSC00586_1_sylotz.jpg"
enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true


[permalinks]
  fiction     = "/:year/:month/:day/:slug/"
  non-fiction = "/:year/:month/:day/:slug/"
  notes       = "/:year/:month/:day/:slug/"

[taxonomies]
  category = "categories"   # non-fiction only
  type     = "types"        # fiction only
  status   = "status"       # note / draft / complete / archived
